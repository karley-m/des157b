<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Yourself</title>

    <!-- Normalize CSS for browser compatability -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">

    <!-- Add link to any google fonts used here -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barriecito&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    

    <!-- My Styles -->
    <link href="styles.css" rel="stylesheet">

    <!-- My Script -->
    <script src="script.js" defer></script>

</head>
<body>
    <header>
        <h1>Sweet Treat O'Clock</h1>
        <h2>in one week in April</h2>
    </header>

    <main>
        <section id="options">
            <div class="day">14</div>
            <div class="day">15</div>
            <div class="day">16</div>
            <div class="day">17</div>
            <div class="day">18</div>
            <div class="day">19</div>
            <div class="day">20</div>
        </section>

        <div id="visuals">
            <section id="info">
                <p>Name of Treat</p>
                <p>Time</p>
                <div id="legend">
                    <div id="themost"></div>
                    <div id="very"></div>
                    <div id="somewhat"></div>
                </div>
    
                <!-- <p> = the most delightful</p>
                <p> = very delightful</p>
                <p> = somewhat delightful</p> -->
                <p>= the most delightful<br>= very delightful<br>= somewhat delightful</p>
            </section>
    
            <section id="treat">
                <img id="plate" src="images/plate.png" alt="a white plate">
    
            </section>
        </div>
        
    </main>




    
</body>
</html>
