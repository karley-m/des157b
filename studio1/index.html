<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockbuster Video</title>

    <!-- Normalize CSS for browser compatability -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">

    <!-- Add link to any google fonts used here -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <link rel="stylesheet" href="https://use.typekit.net/xcq2lrs.css">


    

    <!-- My Styles -->
    <link href="styles.css" rel="stylesheet">

    <!-- My Script -->
    <script src="script.js" defer></script>
</head>
<body>

    <div id="color"></div>

    <video id="overlay" poster="images/poster.jpg" muted autoplay loop playsinline>
        <source src="media/beach2.webm" type="video/webm">
        <source src="media/beach2.mp4" type="video/mp4">
    </video>

    <video id="beach" poster="images/poster.jpg" muted autoplay loop playsinline>
        <source src="media/beach.webm" type="video/webm">
        <source src="media/beach.mp4" type="video/mp4">

        <p>Your browser doesn't support HTML5 video. Here is a <a href="media/beach.mp4">link to the video</a> instead.</p>
    </video>

    <video id="sky" poster="images/poster.jpg" muted autoplay loop playsinline>
        <source src="media/sky.webm" type="video/webm">
        <source src="media/sky.mp4" type="video/mp4">
    </video>

    <section>
        <p id="line1"></p>
    </section>

    <section>
        <p id="line2"></p>
    </section>

    <i class="fas fa-expand"></i>
    <i class="fa-solid fa-star"></i>
    
</body>
</html>
